<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Eraser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      width: 360px;
      background: #09090b;
      color: #fafafa;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #f59e0b;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subtitle {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 14px;
    }
    .lang-row {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      padding: 3px;
      background: #18181b;
      border-radius: 8px;
    }
    .lang-btn {
      flex: 1;
      padding: 6px;
      border: none;
      background: transparent;
      color: #71717a;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #f59e0b;
      color: #09090b;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #71717a;
      letter-spacing: 0.5px;
      margin: 12px 0 8px;
    }
    .checkbox {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #18181b;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .checkbox:hover { background: #27272a; }
    .checkbox input { margin-right: 8px; cursor: pointer; }
    .checkbox label { font-size: 13px; cursor: pointer; flex: 1; }

    .options {
      padding: 10px;
      background: #18181b;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .options label { color: #a1a1aa; display: block; margin-bottom: 4px; }
    .options input[type="date"] {
      width: 100%;
      padding: 6px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 4px;
      color: #fafafa;
      font-size: 12px;
    }

    .start-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #f59e0b, #d97706);
      color: #09090b;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      transition: all 0.15s;
    }
    .start-btn:hover {
      background: linear-gradient(to right, #fbbf24, #f59e0b);
    }
    .start-btn:active {
      transform: scale(0.98);
    }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #71717a;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>🗑️ X-Eraser</h1>
  <div class="subtitle">X / Twitter 批量清理工具</div>

  <div class="lang-row">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
  </div>

  <div class="section-title" data-i18n="actions">操作</div>
  <div class="checkbox">
    <input type="checkbox" id="unlike">
    <label for="unlike" data-i18n="unlike">取消所有点赞</label>
  </div>
  <div class="options" id="unlike-options" style="display:none">
    <label data-i18n="unlikeBefore">仅取消此日期之前的点赞 (留空=全部)</label>
    <input type="date" id="unlike-before">
  </div>

  <div class="checkbox">
    <input type="checkbox" id="bookmark">
    <label for="bookmark" data-i18n="bookmark">移除所有书签</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="unretweet">
    <label for="unretweet" data-i18n="unretweet">撤销所有转发</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="unfollow">
    <label for="unfollow" data-i18n="unfollow">取关所有用户</label>
  </div>
  <div class="options" id="unfollow-options" style="display:none">
    <label><input type="checkbox" id="keep-mutual" checked> 保留互相关注</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="deleteTweets">
    <label for="deleteTweets" data-i18n="deleteTweets">删除所有原创推文</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="deleteReplies">
    <label for="deleteReplies" data-i18n="deleteReplies">删除所有回复</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="unblock">
    <label for="unblock" data-i18n="unblock">解除所有屏蔽</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="unmute">
    <label for="unmute" data-i18n="unmute">取消所有静音</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="deleteDM">
    <label for="deleteDM" data-i18n="deleteDM">删除所有私信会话</label>
  </div>
  <div class="checkbox">
    <input type="checkbox" id="deleteDraft">
    <label for="deleteDraft" data-i18n="deleteDraft">删除所有草稿</label>
  </div>

  <button class="start-btn" id="start-btn" data-i18n="start">开始执行</button>
  <div class="hint" data-i18n="hint">进度面板会自动显示在网页右上角，可最小化或拖动</div>

  <script src="popup.js"></script>
</body>
</html>
